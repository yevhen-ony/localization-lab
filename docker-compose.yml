services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

  viewer:
    image: viewer:latest 
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongodb:27017
    depends_on:
      - mongodb


volumes:
  mongo_data:
